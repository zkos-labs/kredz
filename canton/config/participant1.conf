# Canton Participant 1 — Kredz Operator
# LocalNet configuration for kredz.xyz Canton node
#
# This participant:
#   - Hosts the KredzScore, KredzScoreResponse, KredzAuditLog, and KredzLenderSubscription contracts
#   - Is the signatory on all score records
#   - Connects to the Canton Global Synchronizer (sequencer + mediator)

canton {
  parameters {
    participant {
      admin-api {
        address = "0.0.0.0"
        port = 3902
      }
      ledger-api {
        address = "0.0.0.0"
        port = 3901
      }
    }
  }

  features {
    enable-preview-commands = yes
  }

  monitoring {
    tracing {
      tracer = noop
    }
    metrics {
      reporter = noop
    }
  }
}

canton.participants.participant1 {
  storage {
    type = postgres
    config {
      server = ${POSTGRES_HOST}
      port = 5432
      user = "canton"
      password = "canton"
      database = "participant1"
    }
  }

  ledger-api {
    max-deduplication-duration = 30m
  }

  admin-api {
    address = "0.0.0.0"
    port = 3902
  }

  ledger-api {
    address = "0.0.0.0"
    port = 3901
    server-timeout = 120s
  }
}
