# Canton Participant 2 — Institutional Lender
# LocalNet configuration for a lending institution node
#
# This participant:
#   - Queries KredzScore contracts hosted on participant1
#   - Commands KredzLenderSubscription (subscribe, add/remove borrowers)
#   - Acknowledges KredzScoreResponse (creating audit logs)

canton {
  parameters {
    participant {
      admin-api {
        address = "0.0.0.0"
        port = 3902
      }
      ledger-api {
        address = "0.0.0.0"
        port = 3901
      }
    }
  }

  features {
    enable-preview-commands = yes
  }

  monitoring {
    tracing {
      tracer = noop
    }
    metrics {
      reporter = noop
    }
  }
}

canton.participants.participant2 {
  storage {
    type = postgres
    config {
      server = ${POSTGRES_HOST}
      port = 5432
      user = "canton"
      password = "canton"
      database = "participant2"
    }
  }

  admin-api {
    address = "0.0.0.0"
    port = 3902
  }

  ledger-api {
    address = "0.0.0.0"
    port = 3901
    server-timeout = 120s
  }
}
