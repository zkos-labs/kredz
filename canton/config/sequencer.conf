# Canton Global Synchronizer — Sequencer
# LocalNet configuration for the Canton sequencer node

canton {
  parameters {
    sequencer {
      admin-api {
        address = "0.0.0.0"
        port = 5002
      }
      public-api {
        address = "0.0.0.0"
        port = 5001
      }
    }
  }

  features {
    enable-preview-commands = yes
  }

  monitoring {
    tracing {
      tracer = noop
    }
    metrics {
      reporter = noop
    }
  }
}

canton.sequencers.sequencer1 {
  storage {
    type = postgres
    config {
      server = ${POSTGRES_HOST}
      port = 5432
      user = "canton"
      password = "canton"
      database = "sequencer"
    }
  }

  admin-api {
    address = "0.0.0.0"
    port = 5002
  }

  public-api {
    address = "0.0.0.0"
    port = 5001
  }
}
