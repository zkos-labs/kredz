# Canton Global Synchronizer — Mediator
# LocalNet configuration for the Canton mediator node

canton {
  parameters {
    mediator {
      admin-api {
        address = "0.0.0.0"
        port = 6002
      }
    }
  }

  features {
    enable-preview-commands = yes
  }

  monitoring {
    tracing {
      tracer = noop
    }
    metrics {
      reporter = noop
    }
  }
}

canton.mediators.mediator1 {
  storage {
    type = postgres
    config {
      server = ${POSTGRES_HOST}
      port = 5432
      user = "canton"
      password = "canton"
      database = "mediator"
    }
  }

  admin-api {
    address = "0.0.0.0"
    port = 6002
  }
}
